<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS Agent — Notebook</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #5b5ef4;
            --p2: #8b5cf6;
            --acc: #06d6a0;
            --bg: #f6f7fb;
            --surface: #ffffff;
            --text: #1a1a2e;
            --muted: #8890a4;
            --border: #e8eaf0;
            --radius: 18px;
            --code-bg: #0d1117;
            --code-text: #e6edf3;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); min-height:100vh; overflow-x:hidden; }

        /* ── TOPBAR ── */
        .topbar {
            position:sticky; top:0; z-index:200;
            display:flex; align-items:center; justify-content:space-between;
            padding:12px 18px;
            background:rgba(246,247,251,0.9); backdrop-filter:blur(12px);
            border-bottom:1px solid var(--border);
        }
        .topbar-left { display:flex; align-items:center; gap:12px; }
        .back-btn {
            width:36px; height:36px; border:none; background:var(--surface);
            border-radius:12px; display:flex; align-items:center; justify-content:center;
            cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.08); font-size:16px;
            text-decoration:none; transition:0.15s;
        }
        .back-btn:hover { background:#eef0ff; }
        .topbar-title { font-family:'Sora',sans-serif; font-size:16px; font-weight:700; color:var(--text); }
        .nb-name-input {
            border:none; outline:none; font-family:'Sora',sans-serif; font-size:15px;
            font-weight:700; color:var(--text); background:transparent; cursor:text;
            min-width:120px; max-width:200px;
        }
        .nb-name-input::placeholder { color:var(--muted); }
        .topbar-right { display:flex; align-items:center; gap:8px; }
        .tb-btn {
            display:flex; align-items:center; gap:6px; padding:7px 14px;
            border:none; border-radius:12px; cursor:pointer;
            font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700;
            transition:0.15s;
        }
        .tb-btn-ghost { background:var(--surface); color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,0.07); }
        .tb-btn-ghost:hover { background:#eef0ff; color:var(--p); }
        .tb-btn-primary { background:linear-gradient(135deg,var(--p),var(--p2)); color:white; }
        .tb-btn-primary:hover { opacity:0.9; transform:scale(1.02); }
        .tb-btn-green { background:linear-gradient(135deg,#059669,#06d6a0); color:white; }
        .tb-btn-green:hover { opacity:0.9; }
        .run-all-btn { padding:8px 18px; font-size:13px; }

        /* ── KERNEL STATUS ── */
        .kernel-bar {
            display:flex; align-items:center; gap:10px; padding:8px 18px;
            background:var(--surface); border-bottom:1px solid var(--border);
            font-size:11px; font-weight:600; color:var(--muted);
        }
        .kernel-dot {
            width:8px; height:8px; border-radius:50%; background:#06d6a0;
            box-shadow:0 0 6px rgba(6,214,160,0.5); flex-shrink:0;
        }
        .kernel-dot.busy { background:#f59e0b; box-shadow:0 0 6px rgba(245,158,11,0.5); animation:pulse-k 0.8s infinite; }
        .kernel-dot.dead { background:#ef4444; box-shadow:none; animation:none; }
        @keyframes pulse-k { 0%,100%{opacity:1}50%{opacity:0.4} }
        .kernel-name { font-weight:700; color:var(--text); }
        .exec-count { margin-left:auto; font-size:10px; }

        /* ── TOOLBAR ── */
        .toolbar {
            display:flex; align-items:center; gap:6px; padding:8px 18px;
            background:var(--surface); border-bottom:1px solid var(--border);
            overflow-x:auto; scrollbar-width:none;
        }
        .toolbar::-webkit-scrollbar { display:none; }
        .tool-btn {
            display:flex; align-items:center; gap:4px; padding:5px 10px;
            border:1px solid var(--border); border-radius:9px; background:white;
            cursor:pointer; font-size:11px; font-weight:700; color:var(--text);
            font-family:'DM Sans',sans-serif; white-space:nowrap; transition:0.15s; flex-shrink:0;
        }
        .tool-btn:hover { background:#eef0ff; border-color:var(--p); color:var(--p); }
        .tool-sep { width:1px; height:20px; background:var(--border); flex-shrink:0; margin:0 2px; }
        .cell-type-sel {
            padding:5px 10px; border:1px solid var(--border); border-radius:9px;
            font-size:11px; font-weight:700; font-family:'DM Sans',sans-serif;
            color:var(--text); background:white; cursor:pointer; outline:none;
        }

        /* ── NOTEBOOK BODY ── */
        .nb-container {
            max-width:860px; margin:0 auto; padding:20px 16px 120px;
        }

        /* ── CELL ── */
        .cell {
            margin-bottom:12px; border-radius:14px; overflow:hidden;
            border:2px solid transparent; transition:border-color 0.15s;
            background:var(--surface); box-shadow:0 2px 12px rgba(0,0,0,0.05);
        }
        .cell:hover { border-color:var(--border); }
        .cell.active { border-color:var(--p); box-shadow:0 4px 20px rgba(91,94,244,0.12); }
        .cell.running { border-color:#f59e0b; box-shadow:0 4px 20px rgba(245,158,11,0.15); }
        .cell.error-cell { border-color:#ef4444; }

        .cell-header {
            display:flex; align-items:center; gap:8px;
            padding:8px 12px; background:#f8f9fc; border-bottom:1px solid var(--border);
        }
        .cell-type-badge {
            font-size:9px; font-weight:800; padding:2px 7px; border-radius:6px;
            text-transform:uppercase; letter-spacing:0.5px;
        }
        .badge-code { background:linear-gradient(135deg,var(--p),var(--p2)); color:white; }
        .badge-markdown { background:linear-gradient(135deg,#f59e0b,#f97316); color:white; }
        .badge-raw { background:#888; color:white; }

        .exec-num {
            font-size:10px; font-weight:800; color:var(--muted);
            font-family:'JetBrains Mono',monospace; min-width:24px;
        }
        .exec-num.ran { color:var(--p); }
        .cell-actions { margin-left:auto; display:flex; gap:4px; opacity:0; transition:0.15s; }
        .cell:hover .cell-actions { opacity:1; }
        .cell-act-btn {
            width:26px; height:26px; border:1px solid var(--border); border-radius:7px;
            background:white; cursor:pointer; font-size:12px; display:flex;
            align-items:center; justify-content:center; transition:0.15s;
        }
        .cell-act-btn:hover { background:#eef0ff; border-color:var(--p); }
        .run-cell-btn {
            display:flex; align-items:center; gap:4px; padding:4px 10px;
            background:linear-gradient(135deg,var(--p),var(--p2)); color:white;
            border:none; border-radius:8px; cursor:pointer;
            font-size:11px; font-weight:800; font-family:'DM Sans',sans-serif;
            transition:0.15s;
        }
        .run-cell-btn:hover { opacity:0.85; transform:scale(1.05); }
        .run-cell-btn:disabled { background:#d0d4e8; cursor:not-allowed; transform:none; }

        /* ── CODE EDITOR ── */
        .code-wrap { position:relative; }
        .line-nums {
            position:absolute; left:0; top:0; bottom:0; width:40px;
            background:#0a0d14; border-right:1px solid #1f2937;
            font-family:'JetBrains Mono',monospace; font-size:12px;
            color:#3a4060; padding:12px 0; text-align:right;
            pointer-events:none; user-select:none; overflow:hidden;
            display:flex; flex-direction:column; gap:0;
        }
        .line-num { line-height:1.6em; padding-right:8px; font-size:11px; }
        .code-editor {
            width:100%; min-height:80px; padding:12px 12px 12px 52px;
            background:var(--code-bg); color:var(--code-text);
            font-family:'JetBrains Mono',monospace; font-size:13px;
            border:none; outline:none; resize:none; line-height:1.6;
            tab-size:4; -webkit-user-select:text; user-select:text;
            overflow:hidden; /* auto-expand */
        }
        .code-editor::placeholder { color:#3a4060; }
        .code-editor:focus { background:#0a0d14; }

        /* ── MARKDOWN EDITOR ── */
        .md-editor {
            width:100%; min-height:50px; padding:12px 16px;
            background:#fffdf5; color:var(--text);
            font-family:'DM Sans',sans-serif; font-size:14px;
            border:none; outline:none; resize:none; line-height:1.7;
            -webkit-user-select:text; user-select:text; overflow:hidden;
        }
        .md-preview {
            padding:12px 16px; min-height:40px; font-size:14px; line-height:1.7;
            color:var(--text); background:#fffdf5; display:none;
        }
        .md-preview h1 { font-family:'Sora',sans-serif; font-size:22px; font-weight:800; color:var(--text); margin-bottom:6px; }
        .md-preview h2 { font-family:'Sora',sans-serif; font-size:18px; font-weight:700; color:var(--text); margin-bottom:5px; }
        .md-preview h3 { font-family:'Sora',sans-serif; font-size:15px; font-weight:700; color:var(--p); margin-bottom:4px; }
        .md-preview p { margin-bottom:8px; }
        .md-preview code { background:#eef0ff; color:var(--p); padding:2px 6px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:12px; }
        .md-preview strong { font-weight:700; color:var(--text); }
        .md-preview em { color:var(--p2); }
        .md-preview ul,ol { padding-left:20px; margin-bottom:8px; }
        .md-preview li { margin-bottom:3px; }
        .md-preview blockquote { border-left:3px solid var(--p); padding-left:12px; color:var(--muted); font-style:italic; margin:8px 0; }

        /* ── OUTPUT ── */
        .cell-output { border-top:1px solid var(--border); background:#fafbff; }
        .output-header {
            display:flex; align-items:center; gap:6px; padding:6px 12px;
            font-size:10px; font-weight:700; color:var(--muted);
            border-bottom:1px solid var(--border); background:#f4f5fb;
        }
        .output-type-badge {
            font-size:8px; font-weight:800; padding:1px 6px; border-radius:5px;
        }
        .out-text { background:#e8ffe8; color:#005800; }
        .out-error { background:#ffe8e8; color:#800000; }
        .out-chart { background:linear-gradient(135deg,#eef0ff,#f0e8ff); color:var(--p); }
        .out-df { background:#fff3e0; color:#e65100; }
        .output-body {
            padding:10px 14px 10px 14px; font-family:'JetBrains Mono',monospace;
            font-size:12px; line-height:1.6; color:var(--text);
            max-height:320px; overflow-y:auto; white-space:pre-wrap; word-break:break-all;
        }
        .output-body.error-out { color:#ef4444; }
        .output-body img { max-width:100%; border-radius:8px; margin-top:4px; }
        .output-clear-btn {
            display:block; padding:4px 10px; background:none; border:none;
            color:var(--muted); font-size:10px; font-weight:700; cursor:pointer;
            font-family:'DM Sans',sans-serif;
        }
        .output-clear-btn:hover { color:#ef4444; }

        /* ── RUNNING ANIMATION ── */
        .running-indicator {
            display:flex; align-items:center; gap:6px; padding:8px 14px;
            font-size:11px; font-weight:600; color:var(--p);
        }
        .spin-s { width:14px; height:14px; border:2px solid #eef0ff; border-top:2px solid var(--p); border-radius:50%; animation:spin .7s linear infinite; }
        @keyframes spin{to{transform:rotate(360deg)}}

        /* ── ADD CELL AREA ── */
        .add-cell-zone {
            display:flex; align-items:center; gap:8px; padding:6px 0; opacity:0;
            transition:opacity 0.2s; cursor:pointer;
        }
        .add-cell-zone:hover { opacity:1; }
        .add-cell-zone .add-line { flex:1; height:1px; background:var(--p); opacity:0.3; }
        .add-cell-btn {
            display:flex; align-items:center; gap:5px; padding:4px 12px;
            background:linear-gradient(135deg,var(--p),var(--p2)); color:white;
            border:none; border-radius:20px; cursor:pointer; font-size:11px; font-weight:800;
            font-family:'DM Sans',sans-serif; transition:0.15s;
        }
        .add-cell-btn:hover { transform:scale(1.05); }
        .add-bottom {
            display:flex; gap:8px; justify-content:center; padding:12px 0;
        }
        .add-bottom-btn {
            display:flex; align-items:center; gap:5px; padding:8px 16px;
            border-radius:12px; cursor:pointer; font-size:12px; font-weight:700;
            font-family:'DM Sans',sans-serif; border:2px dashed; transition:0.15s;
        }
        .add-code-btn { border-color:var(--p); color:var(--p); background:#f0f0ff; }
        .add-code-btn:hover { background:#eef0ff; }
        .add-md-btn { border-color:#f59e0b; color:#f59e0b; background:#fff9e6; }
        .add-md-btn:hover { background:#fff3cc; }

        /* ── DATA PANEL ── */
        .data-panel {
            position:fixed; top:0; right:-340px; bottom:0; width:320px;
            background:var(--surface); border-left:1px solid var(--border);
            box-shadow:-4px 0 24px rgba(0,0,0,0.1); z-index:300;
            transition:right 0.3s cubic-bezier(0.4,0,0.2,1);
            display:flex; flex-direction:column;
        }
        .data-panel.open { right:0; }
        .dp-header {
            padding:16px 18px; border-bottom:1px solid var(--border);
            display:flex; align-items:center; justify-content:space-between;
        }
        .dp-header h3 { font-family:'Sora',sans-serif; font-size:15px; font-weight:700; color:var(--text); }
        .dp-close { width:30px; height:30px; border:none; background:#f4f4f8; border-radius:8px; cursor:pointer; font-size:16px; }
        .dp-body { flex:1; overflow-y:auto; padding:14px; }
        .dp-section { margin-bottom:16px; }
        .dp-section-title { font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
        .df-info-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--border); font-size:12px; }
        .df-info-row span { color:var(--muted); }
        .df-info-row strong { color:var(--text); font-weight:700; }
        .col-chip {
            display:inline-flex; align-items:center; gap:4px; padding:3px 8px;
            border-radius:8px; font-size:10px; font-weight:700; margin:2px;
        }
        .col-num { background:#eef0ff; color:var(--p); }
        .col-str { background:#fff3e0; color:#e65100; }
        .col-bool { background:#f0fff4; color:#059669; }
        .snippet-btn {
            display:flex; align-items:center; gap:6px; width:100%; padding:8px 10px;
            background:#f8f9fc; border:1px solid var(--border); border-radius:10px;
            cursor:pointer; font-size:11px; font-weight:700; color:var(--text);
            font-family:'DM Sans',sans-serif; margin-bottom:5px; text-align:left;
            transition:0.15s;
        }
        .snippet-btn:hover { background:#eef0ff; border-color:var(--p); color:var(--p); }

        /* ── SAVE BANNER ── */
        .save-banner {
            position:fixed; bottom:0; left:0; right:0;
            padding:10px 18px; background:var(--surface); border-top:1px solid var(--border);
            display:flex; align-items:center; gap:10px; z-index:200;
            box-shadow:0 -4px 20px rgba(0,0,0,0.08);
        }
        .nb-stats { font-size:11px; color:var(--muted); font-weight:600; flex:1; }
        .save-status { font-size:11px; font-weight:700; }
        .save-status.saved { color:var(--acc); }
        .save-status.unsaved { color:#f59e0b; }

        /* ── PYODIDE STATUS ── */
        .py-loading-overlay {
            display:flex; align-items:center; justify-content:center;
            padding:20px; gap:12px; font-size:13px; color:var(--muted); font-weight:600;
        }

        /* ── TOAST ── */
        .notif-toast {
            position:fixed; top:70px; left:50%; transform:translateX(-50%) translateY(-100px);
            background:#1a1a2e; color:white; padding:10px 18px; border-radius:12px;
            font-size:12px; font-weight:700; z-index:9999;
            transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow:0 4px 16px rgba(0,0,0,0.3); max-width:300px; text-align:center;
        }
        .notif-toast.show { transform:translateX(-50%) translateY(0); }

        /* ── SYNTAX HIGHLIGHT (basic) ── */
        .kw { color:#ff7b72; }
        .str { color:#a5d6ff; }
        .cm { color:#8b949e; font-style:italic; }
        .fn { color:#d2a8ff; }
        .num { color:#79c0ff; }
        .op { color:#f0883e; }

        /* ── TABLE (DataFrame) ── */
        .df-table { width:100%; border-collapse:collapse; font-size:11px; font-family:'JetBrains Mono',monospace; }
        .df-table th { background:linear-gradient(135deg,#eef0ff,#f0e8ff); color:var(--p); font-weight:800; padding:5px 10px; text-align:left; border-bottom:2px solid var(--p); }
        .df-table td { padding:4px 10px; border-bottom:1px solid var(--border); color:var(--text); }
        .df-table tr:nth-child(even) td { background:#f8f9fc; }
        .df-table tr:hover td { background:#f0f0ff; }

        /* ── RESPONSIVE ── */
        @media(max-width:600px) {
            .tb-btn span { display:none; }
            .nb-name-input { max-width:120px; }
            .data-panel { width:90vw; }
        }

        /* ── EMPTY STATE ── */
        .empty-hint {
            text-align:center; padding:32px 20px;
            color:var(--muted); font-size:13px; font-weight:500;
        }
        .empty-hint .big { font-size:42px; margin-bottom:10px; }

        /* ── ANIMATIONS ── */
        @keyframes cellSlide { 0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)} }
        .cell-new { animation:cellSlide 0.3s cubic-bezier(0.34,1.56,0.64,1); }

        @keyframes outputPop { 0%{opacity:0;transform:scaleY(0.9)}100%{opacity:1;transform:scaleY(1)} }
        .output-pop { animation:outputPop 0.25s ease; transform-origin:top; }
    </style>
</head>
<body>

<div class="notif-toast" id="toast">Saved!</div>

<!-- TOPBAR -->
<div class="topbar">
    <div class="topbar-left">
        <a class="back-btn" href="/">←</a>
        <span style="font-size:18px">🐍</span>
        <input class="nb-name-input" id="nbName" type="text" placeholder="Untitled Notebook" value="My Notebook" />
    </div>
    <div class="topbar-right">
        <button class="tb-btn tb-btn-ghost" onclick="toggleDataPanel()">📊 <span>Data</span></button>
        <button class="tb-btn tb-btn-ghost" onclick="clearAllOutputs()">🗑️ <span>Clear</span></button>
        <button class="tb-btn tb-btn-green run-all-btn" onclick="runAllCells()">▶▶ <span>Run All</span></button>
        <button class="tb-btn tb-btn-primary" onclick="saveNotebook()">💾 <span>Save</span></button>
    </div>
</div>

<!-- KERNEL BAR -->
<div class="kernel-bar">
    <div class="kernel-dot" id="kernelDot"></div>
    <span class="kernel-name" id="kernelName">Python 3 (Pyodide) — Loading...</span>
    <span id="kernelStatus" style="color:var(--muted)">Initializing kernel...</span>
    <span class="exec-count" id="execCount">0 cells run</span>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
    <button class="tool-btn" onclick="addCell('code')">＋ Code</button>
    <button class="tool-btn" onclick="addCell('markdown')">＋ Markdown</button>
    <div class="tool-sep"></div>
    <button class="tool-btn" onclick="runActiveCell()">▶ Run</button>
    <button class="tool-btn" onclick="runAllCells()">▶▶ Run All</button>
    <button class="tool-btn" onclick="stopKernel()">⏹ Stop</button>
    <div class="tool-sep"></div>
    <button class="tool-btn" onclick="moveCellUp()">↑ Up</button>
    <button class="tool-btn" onclick="moveCellDown()">↓ Down</button>
    <button class="tool-btn" onclick="deleteActiveCell()">🗑 Delete</button>
    <div class="tool-sep"></div>
    <button class="tool-btn" onclick="clearAllOutputs()">✕ Clear Outputs</button>
    <button class="tool-btn" onclick="loadSampleData()">📁 Sample Data</button>
</div>

<!-- NOTEBOOK BODY -->
<div class="nb-container" id="nbContainer">
    <!-- Cells render here -->
</div>

<!-- DATA PANEL -->
<div class="data-panel" id="dataPanel">
    <div class="dp-header">
        <h3>📊 Data Info</h3>
        <button class="dp-close" onclick="toggleDataPanel()">✕</button>
    </div>
    <div class="dp-body">
        <div class="dp-section">
            <div class="dp-section-title">Uploaded File</div>
            <div id="dpFileInfo" style="font-size:12px;color:var(--muted);font-weight:500">
                Koi file upload nahi. DS Agent pe jao aur CSV upload karo.
            </div>
        </div>
        <div class="dp-section" id="dpDfSection" style="display:none">
            <div class="dp-section-title">DataFrame Info</div>
            <div id="dpDfInfo"></div>
        </div>
        <div class="dp-section" id="dpColSection" style="display:none">
            <div class="dp-section-title">Columns</div>
            <div id="dpCols"></div>
        </div>
        <div class="dp-section">
            <div class="dp-section-title">Quick Snippets</div>
            <button class="snippet-btn" onclick="insertSnippet('load')">📁 Load Uploaded Data</button>
            <button class="snippet-btn" onclick="insertSnippet('head')">👀 df.head()</button>
            <button class="snippet-btn" onclick="insertSnippet('describe')">📊 df.describe()</button>
            <button class="snippet-btn" onclick="insertSnippet('plot')">📈 Bar Chart</button>
            <button class="snippet-btn" onclick="insertSnippet('scatter')">⬤ Scatter Plot</button>
            <button class="snippet-btn" onclick="insertSnippet('corr')">🔗 Correlation</button>
            <button class="snippet-btn" onclick="insertSnippet('missing')">⚠️ Missing Values</button>
            <button class="snippet-btn" onclick="insertSnippet('groupby')">📦 GroupBy</button>
            <button class="snippet-btn" onclick="insertSnippet('ml')">🤖 Linear Regression</button>
        </div>
    </div>
</div>

<!-- SAVE BANNER -->
<div class="save-banner">
    <span class="nb-stats" id="nbStats">0 cells · 0 run</span>
    <span class="save-status unsaved" id="saveStatus">● Unsaved</span>
    <button class="tb-btn tb-btn-primary" onclick="saveNotebook()" style="padding:6px 14px;font-size:12px">💾 Save</button>
    <button class="tb-btn tb-btn-ghost" onclick="downloadNotebook()" style="padding:6px 14px;font-size:12px">⬇️ Download</button>
</div>

<script>
// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let cells = [];
let activeCellId = null;
let pyodideReady = false;
let pyodideLoading = false;
let pyodideObj = null;
let execCounter = 0;
let totalRun = 0;
let kernelBusy = false;
let dfInfo = null; // uploaded file info
let unsaved = false;

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
    loadSavedNotebook();
    if (cells.length === 0) {
        // Welcome cells
        addCell('markdown', `# 🐍 DS Agent Notebook\n\nYahan Python code likho aur **run karo**! Data science ke liye sab libraries ready hain:\n- \`pandas\`, \`numpy\`, \`sklearn\`, \`matplotlib\`, \`seaborn\``);
        addCell('code', `import pandas as pd
import numpy as np

# Agar DS Agent pe file upload ki hai toh load karo:
# df = pd.read_csv('/tmp/uploads/<filename>')

# Quick demo:
data = {'Name': ['Alice', 'Bob', 'Charlie', 'David'],
        'Sales': [1200, 850, 2100, 950],
        'Region': ['North', 'South', 'North', 'East']}
df = pd.DataFrame(data)
print(df)
print('\\nTotal Sales:', df.Sales.sum())`);
        addCell('code', ``);
    }
    initPyodide();
    checkUploadedFile();
    updateStats();
});

// ══════════════════════════════════
// PYODIDE INIT
// ══════════════════════════════════
async function initPyodide() {
    if (pyodideReady || pyodideLoading) return;
    pyodideLoading = true;
    setKernelStatus('busy', 'Loading Python kernel...');
    try {
        if (!window.loadPyodide) {
            await new Promise((res, rej) => {
                const s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js';
                s.onload = res; s.onerror = rej;
                document.head.appendChild(s);
            });
        }
        pyodideObj = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/' });
        await pyodideObj.loadPackage(['pandas', 'numpy', 'micropip', 'matplotlib']);
        // Setup matplotlib for non-interactive use
        await pyodideObj.runPythonAsync(`
import matplotlib
matplotlib.use('Agg')
import matplotlib.pyplot as plt
import io, base64
import sys

def _get_plot_b64():
    buf = io.BytesIO()
    plt.savefig(buf, format='png', bbox_inches='tight', dpi=120)
    buf.seek(0)
    return base64.b64encode(buf.read()).decode()
`);
        pyodideReady = true;
        pyodideLoading = false;
        setKernelStatus('ready', 'Python 3 (Pyodide) — Ready');
        showToast('✅ Python kernel ready! Run karo!');
        // Enable all run buttons
        document.querySelectorAll('.run-cell-btn').forEach(b => b.disabled = false);
    } catch (e) {
        pyodideLoading = false;
        setKernelStatus('dead', 'Kernel load failed — internet chahiye');
        showToast('❌ Kernel load nahi hua. Internet check karo!');
    }
}

function setKernelStatus(state, msg) {
    const dot = document.getElementById('kernelDot');
    const name = document.getElementById('kernelName');
    const status = document.getElementById('kernelStatus');
    dot.className = 'kernel-dot' + (state === 'busy' ? ' busy' : state === 'dead' ? ' dead' : '');
    name.textContent = state === 'ready' ? 'Python 3 (Pyodide) ✅' : 'Python 3 (Pyodide)';
    status.textContent = msg;
}

// ══════════════════════════════════
// CELL MANAGEMENT
// ══════════════════════════════════
let cellIdCounter = 0;

function addCell(type = 'code', content = '', afterId = null) {
    const id = 'cell_' + (++cellIdCounter);
    const cell = { id, type, content, output: null, execNum: null };

    if (afterId) {
        const idx = cells.findIndex(c => c.id === afterId);
        if (idx !== -1) cells.splice(idx + 1, 0, cell);
        else cells.push(cell);
    } else {
        cells.push(cell);
    }

    renderCell(cell, afterId);
    setActiveCell(id);
    updateStats();
    markUnsaved();
    return id;
}

function renderCell(cell, afterId = null) {
    const container = document.getElementById('nbContainer');
    const el = document.createElement('div');
    el.id = 'cellEl_' + cell.id;
    el.className = 'cell cell-new';
    el.onclick = (e) => {
        if (!e.target.closest('.cell-act-btn') && !e.target.closest('.run-cell-btn'))
            setActiveCell(cell.id);
    };

    if (cell.type === 'code') {
        el.innerHTML = `
            <div class="cell-header">
                <span class="cell-type-badge badge-code">Code</span>
                <span class="exec-num" id="execNum_${cell.id}">[&nbsp;]</span>
                <div style="flex:1"></div>
                <div class="cell-actions">
                    <button class="cell-act-btn" onclick="moveCellUpById('${cell.id}')" title="Move Up">↑</button>
                    <button class="cell-act-btn" onclick="moveCellDownById('${cell.id}')" title="Move Down">↓</button>
                    <button class="cell-act-btn" onclick="changeCellType('${cell.id}','markdown')" title="To Markdown">M</button>
                    <button class="cell-act-btn" onclick="duplicateCell('${cell.id}')" title="Duplicate">⧉</button>
                    <button class="cell-act-btn" onclick="deleteCell('${cell.id}')" title="Delete" style="color:#ef4444">✕</button>
                </div>
                <button class="run-cell-btn" id="runBtn_${cell.id}" onclick="runCell('${cell.id}')" ${pyodideReady?'':'disabled'}>▶ Run</button>
            </div>
            <div class="code-wrap">
                <div class="line-nums" id="lineNums_${cell.id}"></div>
                <textarea class="code-editor" id="editor_${cell.id}"
                    spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"
                    placeholder="# Python code yahan likhlo..."
                    oninput="onEditorInput('${cell.id}')"
                    onkeydown="onEditorKeydown(event,'${cell.id}')"
                    onfocus="setActiveCell('${cell.id}')"
                >${escHtml(cell.content)}</textarea>
            </div>
            <div class="cell-output" id="output_${cell.id}" style="display:none"></div>
        `;
    } else if (cell.type === 'markdown') {
        el.innerHTML = `
            <div class="cell-header">
                <span class="cell-type-badge badge-markdown">Markdown</span>
                <div style="flex:1"></div>
                <div class="cell-actions">
                    <button class="cell-act-btn" onclick="moveCellUpById('${cell.id}')" title="Move Up">↑</button>
                    <button class="cell-act-btn" onclick="moveCellDownById('${cell.id}')" title="Move Down">↓</button>
                    <button class="cell-act-btn" onclick="changeCellType('${cell.id}','code')" title="To Code">{ }</button>
                    <button class="cell-act-btn" onclick="duplicateCell('${cell.id}')" title="Duplicate">⧉</button>
                    <button class="cell-act-btn" onclick="deleteCell('${cell.id}')" title="Delete" style="color:#ef4444">✕</button>
                </div>
                <button class="tb-btn tb-btn-ghost" style="padding:4px 10px;font-size:11px" onclick="toggleMdPreview('${cell.id}')">👁 Preview</button>
            </div>
            <textarea class="md-editor" id="editor_${cell.id}"
                placeholder="# Heading\n**bold**, *italic*, \`code\`..."
                oninput="onMdInput('${cell.id}')"
                onfocus="setActiveCell('${cell.id}')"
            >${escHtml(cell.content)}</textarea>
            <div class="md-preview" id="mdPreview_${cell.id}"></div>
        `;
    }

    // Insert at correct position
    if (afterId) {
        const afterEl = document.getElementById('cellEl_' + afterId);
        const addZone = document.getElementById('addZone_' + afterId);
        const insertAfter = addZone || afterEl;
        if (insertAfter && insertAfter.nextSibling) {
            container.insertBefore(el, insertAfter.nextSibling);
        } else {
            container.appendChild(el);
        }
    } else {
        // Insert before add-bottom div
        const addBottom = document.getElementById('addBottom');
        if (addBottom) container.insertBefore(el, addBottom);
        else container.appendChild(el);
    }

    // Add zone after cell
    const zone = document.createElement('div');
    zone.id = 'addZone_' + cell.id;
    zone.className = 'add-cell-zone';
    zone.innerHTML = `<div class="add-line"></div><button class="add-cell-btn" onclick="addCell('code','','${cell.id}')">＋ Code</button><button class="add-cell-btn" onclick="addCell('markdown','','${cell.id}')" style="background:linear-gradient(135deg,#f59e0b,#f97316)">＋ Markdown</button><div class="add-line"></div>`;
    el.after(zone);

    // Auto-expand textarea
    setTimeout(() => {
        const ta = document.getElementById('editor_' + cell.id);
        if (ta) { autoExpand(ta); updateLineNums(cell.id); }
    }, 10);
}

function rebuildNotebook() {
    const container = document.getElementById('nbContainer');
    container.innerHTML = '<div id="addBottom" class="add-bottom"><button class="add-bottom-btn add-code-btn" onclick="addCell(\'code\')">＋ Code Cell</button><button class="add-bottom-btn add-md-btn" onclick="addCell(\'markdown\')">＋ Markdown Cell</button></div>';
    const cellsCopy = [...cells];
    cells = [];
    cellIdCounter = 0;
    cellsCopy.forEach(c => {
        addCell(c.type, c.content);
        // Restore output if any
        if (c.output) {
            const lastCell = cells[cells.length - 1];
            lastCell.execNum = c.execNum;
            lastCell.output = c.output;
            showOutput(lastCell.id, c.output, c.execNum);
        }
    });
}

function setupAddBottom() {
    const container = document.getElementById('nbContainer');
    if (!document.getElementById('addBottom')) {
        const div = document.createElement('div');
        div.id = 'addBottom';
        div.className = 'add-bottom';
        div.innerHTML = `<button class="add-bottom-btn add-code-btn" onclick="addCell('code')">＋ Code Cell</button><button class="add-bottom-btn add-md-btn" onclick="addCell('markdown')">＋ Markdown Cell</button>`;
        container.appendChild(div);
    }
}

// Initialize notebook container
document.addEventListener('DOMContentLoaded', () => {
    setupAddBottom();
});

function setActiveCell(id) {
    activeCellId = id;
    document.querySelectorAll('.cell').forEach(el => el.classList.remove('active'));
    const el = document.getElementById('cellEl_' + id);
    if (el) el.classList.add('active');
}

function deleteCell(id) {
    const el = document.getElementById('cellEl_' + id);
    const zone = document.getElementById('addZone_' + id);
    if (el) el.remove();
    if (zone) zone.remove();
    cells = cells.filter(c => c.id !== id);
    if (activeCellId === id) activeCellId = cells.length ? cells[cells.length - 1].id : null;
    updateStats();
    markUnsaved();
}

function deleteActiveCell() {
    if (activeCellId) deleteCell(activeCellId);
}

function duplicateCell(id) {
    const cell = cells.find(c => c.id === id);
    if (!cell) return;
    const ta = document.getElementById('editor_' + id);
    const content = ta ? ta.value : cell.content;
    addCell(cell.type, content, id);
}

function changeCellType(id, newType) {
    const cell = cells.find(c => c.id === id);
    if (!cell) return;
    const ta = document.getElementById('editor_' + id);
    const content = ta ? ta.value : cell.content;
    const el = document.getElementById('cellEl_' + id);
    const zone = document.getElementById('addZone_' + id);
    const afterPrev = el.previousElementSibling;
    el.remove(); if (zone) zone.remove();
    cells = cells.filter(c => c.id !== id);
    cell.type = newType;
    cell.content = content;
    cells.push(cell);
    renderCell(cell);
    setActiveCell(cell.id);
    markUnsaved();
}

function moveCellUpById(id) {
    const idx = cells.findIndex(c => c.id === id);
    if (idx <= 0) return;
    [cells[idx - 1], cells[idx]] = [cells[idx], cells[idx - 1]];
    rebuildNotebook();
}

function moveCellDownById(id) {
    const idx = cells.findIndex(c => c.id === id);
    if (idx < 0 || idx >= cells.length - 1) return;
    [cells[idx], cells[idx + 1]] = [cells[idx + 1], cells[idx]];
    rebuildNotebook();
}

function moveCellUp() { if (activeCellId) moveCellUpById(activeCellId); }
function moveCellDown() { if (activeCellId) moveCellDownById(activeCellId); }

// ══════════════════════════════════
// EDITOR HELPERS
// ══════════════════════════════════
function autoExpand(ta) {
    ta.style.height = 'auto';
    ta.style.height = Math.max(80, ta.scrollHeight) + 'px';
}

function onEditorInput(id) {
    const ta = document.getElementById('editor_' + id);
    if (!ta) return;
    autoExpand(ta);
    updateLineNums(id);
    const cell = cells.find(c => c.id === id);
    if (cell) cell.content = ta.value;
    markUnsaved();
}

function onMdInput(id) {
    const ta = document.getElementById('editor_' + id);
    if (!ta) return;
    autoExpand(ta);
    const cell = cells.find(c => c.id === id);
    if (cell) cell.content = ta.value;
    markUnsaved();
}

function onEditorKeydown(e, id) {
    const ta = e.target;
    if (e.key === 'Tab') {
        e.preventDefault();
        const s = ta.selectionStart;
        ta.value = ta.value.substring(0, s) + '    ' + ta.value.substring(ta.selectionEnd);
        ta.selectionStart = ta.selectionEnd = s + 4;
        autoExpand(ta); updateLineNums(id);
    }
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        runCell(id);
    }
    if (e.key === 'b' && e.ctrlKey) {
        e.preventDefault();
        addCell('code', '', id);
    }
}

function updateLineNums(id) {
    const ta = document.getElementById('editor_' + id);
    const nums = document.getElementById('lineNums_' + id);
    if (!ta || !nums) return;
    const lines = ta.value.split('\n').length;
    nums.innerHTML = Array.from({ length: lines }, (_, i) =>
        `<div class="line-num">${i + 1}</div>`).join('');
}

function toggleMdPreview(id) {
    const ta = document.getElementById('editor_' + id);
    const preview = document.getElementById('mdPreview_' + id);
    if (!ta || !preview) return;
    const showing = preview.style.display === 'block';
    if (showing) {
        preview.style.display = 'none'; ta.style.display = 'block';
    } else {
        preview.innerHTML = renderMarkdown(ta.value);
        preview.style.display = 'block'; ta.style.display = 'none';
    }
}

function renderMarkdown(text) {
    return text
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
}

// ══════════════════════════════════
// RUN CELLS
// ══════════════════════════════════
async function runCell(id) {
    if (!pyodideReady) { showToast('⏳ Kernel load ho raha hai...'); return; }
    if (kernelBusy) { showToast('⚠️ Ek cell abhi run ho raha hai...'); return; }

    const cell = cells.find(c => c.id === id);
    if (!cell) return;
    const ta = document.getElementById('editor_' + id);
    const code = ta ? ta.value : cell.content;
    if (!code.trim()) return;

    cell.content = code;
    kernelBusy = true;
    setKernelStatus('busy', 'Running...');
    setActiveCell(id);

    const cellEl = document.getElementById('cellEl_' + id);
    if (cellEl) { cellEl.classList.add('running'); cellEl.classList.remove('error-cell'); }

    const outputDiv = document.getElementById('output_' + id);
    if (outputDiv) {
        outputDiv.style.display = 'block';
        outputDiv.innerHTML = `<div class="running-indicator"><div class="spin-s"></div>Running...</div>`;
    }

    const runBtn = document.getElementById('runBtn_' + id);
    if (runBtn) runBtn.disabled = true;

    execCounter++;
    const execNum = execCounter;
    const numEl = document.getElementById('execNum_' + id);
    if (numEl) numEl.innerHTML = `[${execNum}]`;

    try {
        let output = '';
        let plotB64 = null;
        let dfHtml = null;
        let isError = false;

        await pyodideObj.runPythonAsync(`
import sys, io, traceback
_buf = io.StringIO()
sys.stdout = _buf
sys.stderr = _buf
`);

        try {
            await pyodideObj.runPythonAsync(code);
        } catch (err) {
            isError = true;
        }

        await pyodideObj.runPythonAsync(`sys.stdout = sys.__stdout__; sys.stderr = sys.__stderr__`);
        output = pyodideObj.runPython(`_buf.getvalue()`);

        // Check for matplotlib figure
        try {
            const hasFig = await pyodideObj.runPythonAsync(`
import matplotlib.pyplot as plt
len(plt.get_fignums()) > 0
`);
            if (hasFig) {
                plotB64 = await pyodideObj.runPythonAsync(`_get_plot_b64()`);
                await pyodideObj.runPythonAsync(`plt.close('all')`);
            }
        } catch (e) {}

        // Check last expression for DataFrame
        try {
            const isDF = await pyodideObj.runPythonAsync(`
import pandas as pd
isinstance(_, pd.DataFrame) if '_' in dir() else False
`);
            if (isDF) {
                dfHtml = await pyodideObj.runPythonAsync(`_.head(20).to_html(classes='df-table', border=0)`);
            }
        } catch (e) {}

        const result = { output, plotB64, dfHtml, isError };
        cell.output = result;
        cell.execNum = execNum;
        showOutput(id, result, execNum);
        if (numEl) { numEl.innerHTML = `[${execNum}]`; numEl.className = 'exec-num ran'; }
        totalRun++;

        if (cellEl) {
            cellEl.classList.remove('running');
            if (isError) cellEl.classList.add('error-cell');
        }
    } catch (e) {
        const errResult = { output: e.message, isError: true };
        cell.output = errResult;
        showOutput(id, errResult, execNum);
        if (cellEl) { cellEl.classList.remove('running'); cellEl.classList.add('error-cell'); }
    }

    kernelBusy = false;
    if (runBtn) runBtn.disabled = false;
    setKernelStatus('ready', 'Python 3 (Pyodide) — Ready');
    updateStats();
    markUnsaved();
}

function showOutput(id, result, execNum) {
    const outputDiv = document.getElementById('output_' + id);
    if (!outputDiv) return;

    let html = `<div class="output-header">`;
    if (result.plotB64) html += `<span class="output-type-badge out-chart">📊 Chart</span>`;
    else if (result.dfHtml) html += `<span class="output-type-badge out-df">📋 DataFrame</span>`;
    else if (result.isError) html += `<span class="output-type-badge out-error">❌ Error</span>`;
    else html += `<span class="output-type-badge out-text">✅ Output</span>`;
    html += `<span style="margin-left:auto;font-size:9px;color:var(--muted)">Out [${execNum}]</span>`;
    html += `<button class="output-clear-btn" onclick="clearOutput('${id}')">✕</button></div>`;

    if (result.plotB64) {
        html += `<div class="output-body" style="padding:12px">
            <img src="data:image/png;base64,${result.plotB64}" style="max-width:100%;border-radius:10px;display:block" />
            <a href="data:image/png;base64,${result.plotB64}" download="plot_${execNum}.png" style="display:inline-block;margin-top:8px;padding:6px 14px;background:linear-gradient(135deg,var(--p),var(--p2));color:white;border-radius:8px;font-size:11px;font-weight:700;text-decoration:none">⬇️ Download Chart</a>
        </div>`;
    } else if (result.dfHtml) {
        html += `<div class="output-body" style="overflow-x:auto">${result.dfHtml}</div>`;
    }

    if (result.output && result.output.trim()) {
        html += `<div class="output-body ${result.isError ? 'error-out' : ''}">${escHtml(result.output)}</div>`;
    }

    if (!result.output?.trim() && !result.plotB64 && !result.dfHtml) {
        html += `<div class="output-body" style="color:var(--muted);font-size:11px">✅ Executed — koi output nahi</div>`;
    }

    outputDiv.style.display = 'block';
    outputDiv.innerHTML = html;
    outputDiv.classList.add('output-pop');
    setTimeout(() => outputDiv.classList.remove('output-pop'), 300);
}

function clearOutput(id) {
    const outputDiv = document.getElementById('output_' + id);
    if (outputDiv) { outputDiv.style.display = 'none'; outputDiv.innerHTML = ''; }
    const cell = cells.find(c => c.id === id);
    if (cell) { cell.output = null; }
    const numEl = document.getElementById('execNum_' + id);
    if (numEl) { numEl.innerHTML = '[&nbsp;]'; numEl.className = 'exec-num'; }
}

async function runAllCells() {
    if (!pyodideReady) { showToast('⏳ Kernel load ho raha hai...'); return; }
    const codeCells = cells.filter(c => c.type === 'code');
    showToast(`▶▶ Running ${codeCells.length} cells...`);
    for (const cell of codeCells) {
        await runCell(cell.id);
        await new Promise(r => setTimeout(r, 50));
    }
    showToast(`✅ All cells complete!`);
}

function runActiveCell() {
    if (activeCellId) runCell(activeCellId);
}

function stopKernel() {
    kernelBusy = false;
    setKernelStatus('ready', 'Stopped');
    showToast('⏹ Kernel stopped');
}

function clearAllOutputs() {
    cells.forEach(c => clearOutput(c.id));
    totalRun = 0;
    updateStats();
    showToast('🗑️ All outputs cleared');
}

// ══════════════════════════════════
// DATA PANEL
// ══════════════════════════════════
let dataPanelOpen = false;
function toggleDataPanel() {
    dataPanelOpen = !dataPanelOpen;
    document.getElementById('dataPanel').classList.toggle('open', dataPanelOpen);
}

async function checkUploadedFile() {
    try {
        const r = await fetch('/get_username');
        const d = await r.json();
        if (d.username) {
            document.getElementById('dpFileInfo').textContent = `Logged in: ${d.username} (${d.plan || 'free'} plan)`;
        }
    } catch (e) {}

    // Try to get data info
    try {
        const r = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'show column names as comma separated', ai_mode: false })
        });
        const d = await r.json();
        if (d.response && !d.response.includes('❌') && !d.response.includes('upload')) {
            document.getElementById('dpDfSection').style.display = 'block';
            document.getElementById('dpColSection').style.display = 'block';
            const cols = d.response.match(/[A-Za-z_][A-Za-z0-9_ ]*/g) || [];
            const colsClean = [...new Set(cols.filter(c => c.length > 1 && c.length < 40))].slice(0, 20);
            document.getElementById('dpCols').innerHTML = colsClean.map(c =>
                `<span class="col-chip col-num">📊 ${c}</span>`).join('');

        }
    } catch (e) {}
}

// ══════════════════════════════════
// SAVE / LOAD
// ══════════════════════════════════
function saveNotebook() {
    const nbName = document.getElementById('nbName').value || 'Untitled';
    const data = {
        name: nbName,
        cells: cells.map(c => {
            const ta = document.getElementById('editor_' + c.id);
            return {
                type: c.type,
                content: ta ? ta.value : c.content,
                execNum: c.execNum
            };
        }),
        saved: new Date().toISOString()
    };
    try {
        localStorage.setItem('dsagent_notebook', JSON.stringify(data));
        document.getElementById('saveStatus').textContent = '✅ Saved';
        document.getElementById('saveStatus').className = 'save-status saved';
        unsaved = false;
        showToast('💾 Notebook saved!');
        setTimeout(() => {
            document.getElementById('saveStatus').textContent = '● Auto-saved';
        }, 3000);
    } catch (e) {
        showToast('❌ Save failed (localStorage full?)');
    }
}

function loadSavedNotebook() {
    try {
        const raw = localStorage.getItem('dsagent_notebook');
        if (!raw) return;
        const data = JSON.parse(raw);
        if (data.name) document.getElementById('nbName').value = data.name;
        if (data.cells && data.cells.length > 0) {
            cells = []; // will be rebuilt
            setupAddBottom();
            data.cells.forEach(c => {
                addCell(c.type, c.content || '');
            });
            showToast('📂 Notebook loaded!');
        }
    } catch (e) {}
}

function downloadNotebook() {
    const nbName = document.getElementById('nbName').value || 'notebook';
    const data = {
        name: nbName,
        cells: cells.map(c => {
            const ta = document.getElementById('editor_' + c.id);
            return { type: c.type, content: ta ? ta.value : c.content };
        })
    };
    // Export as .ipynb-like JSON
    const ipynb = {
        nbformat: 4,
        nbformat_minor: 5,
        metadata: { kernelspec: { display_name: 'Python 3', language: 'python', name: 'python3' }, language_info: { name: 'python', version: '3.11' } },
        cells: data.cells.map(c => ({
            cell_type: c.type === 'markdown' ? 'markdown' : 'code',
            source: c.content,
            metadata: {},
            outputs: [],
            execution_count: null
        }))
    };
    const blob = new Blob([JSON.stringify(ipynb, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = nbName.replace(/\s+/g, '_') + '.ipynb';
    a.click();
    showToast('⬇️ Downloaded as .ipynb');
}

function markUnsaved() {
    if (!unsaved) {
        unsaved = true;
        document.getElementById('saveStatus').textContent = '● Unsaved';
        document.getElementById('saveStatus').className = 'save-status unsaved';
    }
}

// Auto-save every 60s
setInterval(() => { if (unsaved) saveNotebook(); }, 60000);

// ══════════════════════════════════
// STATS
// ══════════════════════════════════
function updateStats() {
    const total = cells.length;
    document.getElementById('nbStats').textContent = `${total} cells · ${totalRun} run`;
    document.getElementById('execCount').textContent = `${totalRun} cells run`;
}

// ══════════════════════════════════
// UTILS
// ══════════════════════════════════
function escHtml(t) {
    return (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg, dur = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveNotebook(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); if (activeCellId) runCell(activeCellId); }
});

// Confirm leave if unsaved
window.addEventListener('beforeunload', e => {
    if (unsaved) { e.preventDefault(); e.returnValue = ''; }
});
